spring:
  application:
    name: columnar-database-service
  cassandra:
    contact-points: ${CASSANDRA_HOST:cassandra}
    port: ${CASSANDRA_PORT:9042}
    local-datacenter: ${CASSANDRA_DATACENTER:datacenter1}
    keyspace-name: nais_stats
    schema-action: create-if-not-exists
    connection:
      connect-timeout: 30s
      init-query-timeout: 60s
    request:
      consistency: local_quorum
      timeout: 10s

server:
  port: ${SERVER_PORT:9050}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

nais:
  relational-base-url: ${RELATIONAL_SERVICE_URL:http://relational-database-service:9030}
  internal-api-key: ${INTERNAL_API_SECRET:nais-internal-shared-secret}
  jwt:
    secret: ${JWT_SECRET:nais-demo-secret-change-me-for-demo-32b}

logging:
  level:
    rs.ac.uns.acs.nais: INFO

management:
  endpoints:
    web:
      exposure:
        include: health
