spring:
  application:
    name: relational-database-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:nais}
    username: ${DB_USER:nais}
    password: ${DB_PASSWORD:nais}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

server:
  port: 9030

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

nais:
  internal-api-secret: ${INTERNAL_API_SECRET:}
  jwt:
    secret: ${JWT_SECRET:nais-demo-secret-change-me-for-demo-32b}
  vector-service:
    base-url: ${VECTOR_SERVICE_URL:http://localhost:8000}
  llm:
    openai-api-key: ${GROQ_API_KEY:}
    openai-base-url: ${OPENAI_BASE_URL:https://api.groq.com/openai/v1}
    openai-model: ${OPENAI_MODEL:llama-3.3-70b-versatile}
  assistant:
    qdrant-enabled: ${NAIS_ASSISTANT_QDRANT_ENABLED:true}

management:
  endpoints:
    web:
      exposure:
        include: health
